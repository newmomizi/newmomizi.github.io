<html>
    <head>
        <title>Hello, World</title>
    </head>
    
    <body>
        <div id="header">
            <h1 class="title">Hello, World!</h1>
        </div>

        <div id="decoder">
            <h2 class="subtitle">URL Decoder</h2>
            <form name="inputbox">
                <input type="text" placeholder="Type encoded text here..." id="bin">
            </form>
            <a href="#" onclick="decode()" id="decoded">Decode</a>
        </div>

        <div id="UA">
            <h2 class="subtitle">Your UserAgent</h2>
            <a href="#" onclick="getUA()" id="userAgent">Get my UA</a>
        </div>

        <div id="about">
            <h2 class="subtitle">What is this website?</h2>
            <p>Sample program by newmomizi.</p>
        </div>

        <div id="footer">
            <p>copyright(c) 2023 newmomizi</p>
        </div>
    </body>

    <script language="JavaScript">
        function decode() {
            var encoded = document.getElementById("bin").innerHTML;
            document.getElementById("decoded").innerHTML = decodeURIComponent(encoded) + "<br>(Click to refresh)";
        }
        function getUA() {
            document.getElementById("userAgent").innerHTML = navigator.userAgent + "<br>(Click to refresh)";
        }
    </script>
</html>
