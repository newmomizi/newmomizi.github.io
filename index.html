<html>
    <head>
        <title>Hello, World</title>
    </head>

    <body>
        <div id="header">
            <h1 class="title">Hello, World!</h1>
        </div>

        <div id="decoder">
            <h2 class="subtitle">URL Decoder</h2>
            <input type="text" placeholder="Type encoded text here..." size="150" id="bin"><br>
            <a href="#" onclick="decode()" id="decode-button">Decode</a><br>
            <input type="text" placeholder="Decoded text" size="150" id="decoded">
        </div>

        <div id="UA">
            <h2 class="subtitle">Your UserAgent</h2>
            <a href="#" onclick="getUA()" id="UA-button">Get my UA</a><br>
            <input type="text" placeholder="Your UA" size="150" id="userAgent">
        </div>

        <div id="about">
            <h2 class="subtitle">What is this website?</h2>
            <p>Sample program by newmomizi.</p>
        </div>

        <div id="footer">
            <p>copyright(c) 2023 newmomizi</p>
        </div>
    </body>

    <script language="JavaScript">
        //URLデコーダー
        function decode() {
            var encoded = document.getElementById("bin").value;
            document.getElementById("decoded").value = decodeURIComponent(encoded);
        }

        //UserAgent取得処理
        function getUA() {
            document.getElementById("userAgent").value = navigator.userAgent;
        }
    </script>
</html>
